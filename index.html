<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DotUp | Diseño & Desarrollo Web Boutique en Santiago</title>

<meta name="description" content="Estudio boutique especializado en desarrollo web de alto rendimiento y diseño exclusivo en Santiago. Elevamos tu ADN digital.">

<link rel="preload" as="video" href="video-dotup.mp4" type="video/mp4">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

/* =========================
   VARIABLES DOTUP
========================= */
:root{
--color-dark:#041208;
--color-dark-2:#082b14;
--color-gold:#f97316;
--color-gold-soft:#fb923c;
--color-light:#f4f1ea;
--color-white:#ffffff;
--color-gray:#a0a0a0;
--container:1200px;
}

*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Inter',sans-serif;background:var(--color-dark);color:var(--color-white);overflow-x:hidden;}

h1,h2,h3{font-family:'Playfair Display',serif;font-weight:600;letter-spacing:0.5px;}
h1{font-size:clamp(2.5rem,5vw,4rem);}
h2{font-size:clamp(2rem,4vw,2.8rem);margin-bottom:2rem;text-align:center;}
p{line-height:1.8;color:var(--color-gray);}
.container{max-width:var(--container);margin:auto;padding:0 2rem;}

/* HEADER */
header{position:fixed;top:0;width:100%;z-index:1000;background:transparent;transition:0.4s;}
header.scrolled{background:rgba(4,18,8,0.95);backdrop-filter:blur(10px);}
.nav{display:flex;justify-content:space-between;align-items:center;height:70px;}
.logo img{height:140px;}
.nav-links{display:flex;gap:2rem;list-style:none;}
.nav-links a{text-decoration:none;color:white;font-size:0.95rem;opacity:0.85;position:relative;}
.nav-links a::after{content:"";position:absolute;bottom:-6px;left:0;width:0%;height:1px;background:var(--color-gold);transition:0.3s;}
.nav-links a:hover::after{width:100%;}

/* HERO PREMIUM */

.hero{
position:relative;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
overflow:hidden;
background:#000;
}

.hero-video{
position:absolute;
top:50%;
left:50%;
width:100%;
height:100%;
object-fit:cover;
transform:translate(-50%,-50%);
filter:brightness(0.55) contrast(1.2) saturate(1.05);
z-index:-2;
opacity:0;
animation:videoFade 1.8s ease forwards;
}

@keyframes videoFade{
to{opacity:1;}
}

.hero-overlay{
position:absolute;
inset:0;
background:linear-gradient(to bottom,rgba(0,0,0,0.4) 0%,rgba(4,18,8,0.9) 100%);
z-index:-1;
}

.hero-content{max-width:800px;position:relative;z-index:2;}

.hero-content span{
color:var(--color-gold);
letter-spacing:3px;
font-size:0.85rem;
text-transform:uppercase;
}

.hero-content h1{margin-top:20px;}

.hero-content h1 span{
color:var(--color-gold);
animation:glow 2.5s infinite alternate;
}

@keyframes glow{
from{text-shadow:0 0 5px rgba(249,115,22,0.4);}
to{text-shadow:0 0 18px rgba(249,115,22,0.9);}
}

.btn{
display:inline-block;
background:var(--color-gold);
color:white;
padding:14px 34px;
text-decoration:none;
font-weight:600;
letter-spacing:1px;
transition:0.3s;
}

.btn:hover{
background:var(--color-gold-soft);
transform:scale(1.05);
}

section{padding:120px 0;}

@media(max-width:768px){
.nav-links{display:none;}
}

</style>
</head>

<body>

<header>
<div class="container nav">
<div class="logo">
<a href="#hero">
<img src="https://github.com/DotUp-Chile/Sastreria_isi/blob/main/dotup.png?raw=true" alt="DotUp Logo">
</a>
</div>
<ul class="nav-links">
<li><a href="#servicios">Expertise</a></li>
<li><a href="#proceso">Metodología</a></li>
<li><a href="#contacto">Hablemos</a></li>
</ul>
</div>
</header>

<section class="hero" id="hero">

<video class="hero-video"
autoplay
muted
loop
playsinline
webkit-playsinline
preload="auto">

<source src="video-dotup.mp4" type="video/mp4">

</video>

<div class="hero-overlay"></div>

<div class="hero-content">
<span>Estudio Web Boutique</span>
<h1>Elevamos tu ADN digital<span>.</span></h1>
<p>Diseño exclusivo y desarrollo de alto rendimiento para marcas que buscan distinción absoluta en el mundo digital.</p>
<a href="#contacto" class="btn">Iniciar Proyecto</a>
</div>

</section>

<script>
window.addEventListener("scroll",()=>{
document.querySelector("header").classList.toggle("scrolled",window.scrollY>50);
});
</script>

</body>
</html>
